<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GPS San Francisco</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container-fluid vh-100 d-flex flex-column flex-lg-row p-0" id="split-container">
    
    <!-- Sidebar -->
    <div id="sidebar" class="bg-light d-flex flex-column">
        <div id="drag-handle" class="bg-secondary"></div>

        <!-- 🔍 BUSCADOR (altura automática) -->
        <div id="search-container" class="p-2 border-bottom">
            <div class="position-relative mb-2">
                <input id="chat-input" class="form-control" type="text" placeholder="Where do you want to go?">
                <div id="suggestions" class="list-group position-absolute w-100"></div>
            </div>

            <button id="chat-send" class="btn btn-primary w-100">Search</button>
            <select id="transport-type" class="form-select" aria-label="Default select example">
                <option selected>Type of transport</option>
                <option value="public-transport">Public Transport</option>
                <option value="Car">Car</option>
                <option value="Walk">Walk</option>
            </select>
        </div>

        <!-- 📊 RESULTADOS (ocupa todo el resto) -->
        <div id="chat-result" class="flex-fill overflow-auto p-2"></div>
    </div>

    <!-- Map -->
    <div id="map" class="flex-fill"></div>
</div>
<div id="toast" style="
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<!-- Bootstrap JS (optional, only for components) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="/static/map.js"></script>
</body>
</html>
