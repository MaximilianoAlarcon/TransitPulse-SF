<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GPS San Francisco</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container-fluid vh-100 d-flex flex-column flex-lg-row p-0" id="split-container">
    
    <!-- Sidebar -->
    <div id="sidebar" class="bg-light d-flex flex-column">
        <div id="drag-handle" class="bg-secondary"></div>
        <div id="sidebar-content" class="p-2 flex-fill overflow-auto">
            <input id="chat-input" class="form-control mb-2" type="text" placeholder="Where do you want to go?">
            
            <div id="suggestions" class="list-group mb-2"></div>
            
            <button id="chat-send" class="btn btn-primary mb-2 w-100">Search</button>
            <div id="chat-result"></div>
        </div>
    </div>

    <!-- Map -->
    <div id="map" class="flex-fill"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<!-- Bootstrap JS (optional, only for components) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="/static/map.js"></script>
</body>
</html>
