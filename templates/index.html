<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GPS San Francisco</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="alert-container"
     class="position-fixed top-0 start-50 translate-middle-x mt-3"
     style="z-index: 9999; width: auto; max-width: 90%;">
</div>

<div class="container-fluid vh-100 d-flex flex-column flex-lg-row p-0" id="split-container">
    
    <!-- Drag handle (fuera del sidebar para no empujar el contenido) -->
    <div id="drag-handle" class="bg-secondary"></div>

    <!-- Sidebar -->
    <div id="sidebar" class="bg-light d-flex flex-column">

        <!-- 🔍 BUSCADOR (altura automática) -->
        <div id="search-container" class="p-2 border-bottom">

            <!-- ORIGIN -->
            <div class="position-relative mb-2">
                <input id="chat-origin" class="form-control pe-5" type="text" placeholder="Your location">
                <span id="clear-origin" class="clear-btn">&times;</span>
                <div id="suggestions-origin" class="list-group position-absolute w-100"></div>
            </div>

            <!-- DESTINATION -->
            <div class="position-relative mb-2">
                <input id="chat-input" class="form-control pe-5" type="text" placeholder="Where do you want to go?">
                <span id="clear-input" class="clear-btn">&times;</span>
                <div id="suggestions" class="list-group position-absolute w-100"></div>
            </div>

            <select id="transport-type" class="form-select">
                <option value="public-transport" selected>Public Transport 🚇</option>
                <option value="Car">Car 🚗</option>
                <option value="Walk">Walk 🚶</option>
            </select>

            <!-- ADVANCED OPTIONS -->
            
            <button id="toggle-advanced-options" class="btn btn-link">⚙️ More options</button>

            <div class="advanced-input" id="advanced-options" style="display:none;">

                <div class="mb-2">
                    <label class="fw-bold d-block">Priority</label>

                    <input type="radio" id="pref-fastest" name="pref" value="fastest" checked>
                    <label for="pref-fastest">⚡ Fastest</label><br>

                    <input type="radio" id="pref-fewest" name="pref" value="fewest">
                    <label for="pref-fewest">🔄 Fewer transfers</label><br>

                    <input type="radio" id="pref-walking" name="pref" value="walking">
                    <label for="pref-walking">🚶 Less walking</label>
                </div>

                <div class="mb-2">
                    <label class="fw-bold">Time</label><br>
                    <select id="time-type" class="form-select mb-1">
                        <option value="now">Leave now</option>
                        <option value="depart">Depart at</option>
                        <option value="arrive">Arrive by</option>
                    </select>

                    <input type="time" id="time-input" class="form-control" style="display:none;">
                </div>

                <div class="mb-2">
                    <label class="fw-bold">Max walking distance</label><br>
                    <select id="max-walk" class="form-select">
                        <option value="">No limit</option>
                        <option value="500">Up to 500 m</option>
                        <option value="1000">Up to 1 km</option>
                        <option value="2000">Up to 2 km</option>
                    </select>
                </div>

                <div class="mb-2">
                    <input type="checkbox" id="wheelchair" name="wheelchair">
                    <label for="wheelchair">♿ Wheelchair accessible</label>
                </div>

            </div>


            <button id="chat-send" class="btn btn-primary w-100">Search</button>

        </div>

        <!-- 📊 RESULTADOS (ocupa todo el resto) -->
        <div id="chat-result" class="flex-fill overflow-auto p-2"></div>
    </div>


    <!-- Map -->
    <div id="map-container" class="flex-fill position-relative">
        <div id="map" style="height: 100%;"></div>

        <button id="btn-compass" type="button" class="map-btn">
            🧭 Nav
        </button>
    </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>

<!-- Bootstrap JS (optional, only for components) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="/static/map.js"></script>
</body>
</html>
